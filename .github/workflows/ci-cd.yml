name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Dummy Tests
        run: |
          echo "Running dummy test suite..."
          python -m py_compile example_service.py
          echo "Syntax check passed for example_service.py"
          echo "All dummy tests passed successfully!"

  deploy:
    needs: ci
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run Service and Update HTML
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python example_service.py > service_output.txt 2>&1 || true
          python -c "
          import html
          try:
              with open('service_output.txt', 'r') as f:
                  output = html.escape(f.read())
              with open('public/index.html', 'r') as f:
                  content = f.read()
              with open('public/index.html', 'w') as f:
                  f.write(content.replace('<!-- SERVICE_OUTPUT -->', output))
          except Exception as e:
              print(f'Error injecting output: {e}')
          "
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
